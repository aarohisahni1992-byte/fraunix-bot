<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5865F2;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#5865F2;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#57F287;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#57F287;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shieldMini" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5865F2"/>
      <stop offset="100%" style="stop-color:#4752C4"/>
    </linearGradient>
    <linearGradient id="accGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#57F287"/>
      <stop offset="100%" style="stop-color:#5865F2"/>
    </linearGradient>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="240" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="550" y1="0" x2="550" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="240" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="600" y2="0" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="600" y2="40" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="600" y2="80" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="600" y2="120" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="600" y2="160" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="600" y2="200" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="600" y2="240" stroke="#5865F2" stroke-width="0.5"/>
  </g>

  <!-- Accent line -->
  <rect x="0" y="0" width="600" height="3" fill="url(#lineGrad)"/>
  <rect x="0" y="237" width="600" height="3" fill="url(#lineGrad)"/>

  <!-- Shield icon -->
  <g transform="translate(40, 70)">
    <path d="M50 0 L100 25 L100 90 C100 140 70 170 50 180 C30 170 0 140 0 90 L0 25 Z"
          fill="url(#shieldMini)" stroke="#7c8aff" stroke-width="1.5"/>
    <polygon points="50,20 62,55 100,55 70,75 80,115 50,95 20,115 30,75 0,55 38,55"
             fill="#57F287" opacity="0.9"/>
  </g>

  <!-- Main text -->
  <text x="160" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="42"
        font-weight="800" fill="#ffffff" filter="url(#glowText)">
    FRAUNIX
  </text>

  <!-- Version -->
  <rect x="365" y="58" width="60" height="24" rx="12" fill="#5865F2" opacity="0.8"/>
  <text x="395" y="75" font-family="Arial, sans-serif" font-size="12"
        font-weight="bold" fill="#ffffff" text-anchor="middle">
    v1.0
  </text>

  <!-- Tagline -->
  <text x="160" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="16"
        fill="#a0a0c0" font-weight="400">
    Precision Moderation for Modern Communities
  </text>

  <!-- Feature pills -->
  <g transform="translate(160, 148)">
    <rect x="0" y="0" width="80" height="22" rx="11" fill="#5865F2" opacity="0.2"/>
    <text x="40" y="15" font-family="Arial, sans-serif" font-size="10"
          fill="#8b9cff" text-anchor="middle" font-weight="600">45+ COMMANDS</text>

    <rect x="90" y="0" width="70" height="22" rx="11" fill="#57F287" opacity="0.15"/>
    <text x="125" y="15" font-family="Arial, sans-serif" font-size="10"
          fill="#57F287" text-anchor="middle" font-weight="600">REALTIME</text>

    <rect x="170" y="0" width="80" height="22" rx="11" fill="#FEE75C" opacity="0.15"/>
    <text x="210" y="15" font-family="Arial, sans-serif" font-size="10"
          fill="#FEE75C" text-anchor="middle" font-weight="600">PREMIUM UI</text>
  </g>

  <!-- Right side decorative elements -->
  <g opacity="0.15">
    <circle cx="520" cy="60" r="30" fill="none" stroke="#5865F2" stroke-width="2"/>
    <circle cx="520" cy="60" r="50" fill="none" stroke="#5865F2" stroke-width="1"/>
    <circle cx="520" cy="60" r="70" fill="none" stroke="#5865F2" stroke-width="0.5"/>
    <line x1="490" y1="60" x2="550" y2="60" stroke="#57F287" stroke-width="1"/>
    <line x1="520" y1="30" x2="520" y2="90" stroke="#57F287" stroke-width="1"/>
  </g>

  <!-- Bottom dots -->
  <circle cx="280" cy="220" r="2" fill="#5865F2" opacity="0.6"/>
  <circle cx="295" cy="220" r="2" fill="#57F287" opacity="0.6"/>
  <circle cx="310" cy="220" r="2" fill="#5865F2" opacity="0.6"/>
  <circle cx="325" cy="220" r="2" fill="#57F287" opacity="0.6"/>
  <circle cx="340" cy="220" r="2" fill="#5865F2" opacity="0.6"/>
</svg>
